# Drop-in to relax hyper-derp.service for WG-relay / XDP fast-path
# mode. Installed to /lib/systemd/system/hyper-derp.service.d/ so it
# applies automatically; harmless for DERP mode (the extra caps are
# granted but not exercised). Operators who want stricter sandboxing
# in DERP-only deployments can mask this file with an empty override
# at /etc/systemd/system/hyper-derp.service.d/wg-mode.conf.

[Service]
# Writable state dir for the WG roster. systemd creates
# /var/lib/hyper-derp owned by the per-instance DynamicUser.
StateDirectory=hyper-derp

# WG netlink ops need CAP_NET_ADMIN. XDP attach needs CAP_BPF and
# the bpf() syscall — adding both keeps "easy mode" working whether
# the user enables xdp_interface or not.
AmbientCapabilities=CAP_BPF CAP_NET_ADMIN CAP_SYS_NICE
SystemCallFilter=bpf

# AF_NETLINK is required for both WG (wg netlink) and XDP attach.
RestrictAddressFamilies=AF_INET AF_INET6 AF_UNIX AF_NETLINK
