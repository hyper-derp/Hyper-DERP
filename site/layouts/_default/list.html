{{ define "main" }}
<article>
  <h1>{{ .Title }}</h1>
  {{ .Content }}
  {{ if .Pages }}
  <ul class="page-list">
    {{- range .Pages }}
    <li>
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      {{- with .Description }}
      <span class="desc">{{ . }}</span>
      {{- end }}
    </li>
    {{- end }}
  </ul>
  {{- end }}
</article>
{{ end }}
