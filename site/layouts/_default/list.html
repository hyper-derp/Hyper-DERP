{{ define "main" }}
<article class="content-page">
  <h1>{{ .Title }}</h1>
  {{ .Content }}
  {{ range .Pages }}
    <div class="page-item">
      <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
      {{ with .Description }}
        <p>{{ . }}</p>
      {{ end }}
    </div>
  {{ end }}
</article>
{{ end }}
