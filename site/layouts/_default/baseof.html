<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}"
      data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1">
  <title>
    {{- if .IsHome -}}
      {{ .Site.Title }}
    {{- else -}}
      {{ .Title }} &ndash; {{ .Site.Title }}
    {{- end -}}
  </title>
  <meta name="description"
        content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect"
        href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Fira+Sans:wght@400;500;600;700&display=swap">
  <link rel="stylesheet"
        href="https://cdn.lineicons.com/4.0/lineicons.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  {{ partial "header.html" . }}
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <div class="lightbox" id="lightbox">
    <img src="" alt="">
  </div>
  <script>
    (function() {
      var btn = document.getElementById('theme-toggle');
      if (!btn) return;
      var html = document.documentElement;
      var stored = localStorage.getItem('theme');
      if (stored) html.setAttribute('data-theme', stored);
      function updateIcon() {
        var t = html.getAttribute('data-theme');
        btn.innerHTML = t === 'dark'
          ? '<i class="lni lni-night"></i>'
          : '<i class="lni lni-sun"></i>';
      }
      function updatePlots() {
        var t = html.getAttribute('data-theme');
        document.querySelectorAll('img[data-dark]')
          .forEach(function(img) {
            img.src = t === 'dark'
              ? img.getAttribute('data-dark')
              : img.getAttribute('data-light');
          });
      }
      function updateLinks() {
        var t = html.getAttribute('data-theme');
        document.querySelectorAll('a[data-dark]')
          .forEach(function(a) {
            a.href = t === 'dark'
              ? a.getAttribute('data-dark')
              : a.getAttribute('data-light');
          });
      }
      updateIcon();
      updatePlots();
      updateLinks();
      btn.addEventListener('click', function() {
        var current = html.getAttribute('data-theme');
        var next = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        updateIcon();
        updatePlots();
        updateLinks();
      });
      // Lightbox
      var lb = document.getElementById('lightbox');
      var lbImg = lb.querySelector('img');
      document.querySelectorAll('.plot-link')
        .forEach(function(a) {
          a.addEventListener('click', function(e) {
            e.preventDefault();
            lbImg.src = a.href;
            lbImg.alt = a.querySelector('img').alt;
            lb.classList.add('open');
          });
        });
      lb.addEventListener('click', function() {
        lb.classList.remove('open');
      });
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') lb.classList.remove('open');
      });
    })();
  </script>
</body>
</html>
