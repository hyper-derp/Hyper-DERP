{{ define "main" }}
<div class="docs-layout">
  <aside class="docs-nav">
    <h3>Documentation</h3>
    <ul>
      {{ $section := .Site.GetPage "docs" }}
      {{ range $section.Pages }}
        <li>
          <a href="{{ .RelPermalink }}"
             {{ if eq $.RelPermalink .RelPermalink }}
               class="active"
             {{ end }}>
            {{ .Title }}
          </a>
        </li>
      {{ end }}
    </ul>
  </aside>
  <article class="content-page">
    <h1>{{ .Title }}</h1>
    {{ .Content }}
  </article>
</div>
{{ end }}
