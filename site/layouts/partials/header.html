<header class="site-header">
  <nav>
    <a href="/" class="site-title">Hyper-DERP</a>
    <ul class="nav-links">
      {{ range .Site.Menus.main }}
        <li>
          <a href="{{ .URL }}"
             {{ if .Params.external }}
               target="_blank" rel="noopener"
             {{ end }}>
            {{- .Name -}}
          </a>
        </li>
      {{ end }}
      <li>
        <button id="theme-toggle"
                title="Toggle light/dark mode"
                aria-label="Toggle theme">
          &#9789;
        </button>
      </li>
    </ul>
  </nav>
</header>
