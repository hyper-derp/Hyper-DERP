{{ define "main" }}
<article class="content-page blog-post">
  <header class="post-header">
    <h1>{{ .Title }}</h1>
    <time datetime="{{ .Date.Format "2006-01-02" }}">
      {{ .Date.Format "January 2, 2006" }}
    </time>
    {{ with .Params.author }}
      <span class="author">&mdash; {{ . }}</span>
    {{ end }}
    {{ with .Params.tags }}
      <div class="tags">
        {{ range . }}
          <span class="tag">{{ . }}</span>
        {{ end }}
      </div>
    {{ end }}
  </header>
  {{ .Content }}
</article>
{{ end }}
