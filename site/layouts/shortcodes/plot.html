{{- /* plot: theme-aware image with lightbox */ -}}
{{ $name := .Get "src" }}
{{ $dir := .Get "dir" | default "/img/blog" }}
{{ $alt := .Get "alt" | default "" }}
<a href="{{ $dir }}/{{ $name }}" class="plot-link"
   data-dark="{{ $dir }}/{{ $name }}"
   data-light="{{ $dir }}/light/{{ $name }}">
  <img src="{{ $dir }}/{{ $name }}"
       alt="{{ $alt }}"
       class="plot-img"
       data-dark="{{ $dir }}/{{ $name }}"
       data-light="{{ $dir }}/light/{{ $name }}">
</a>
