# Headscale config for Hyper-DERP integration testing.
# Runs on the host, listens on virbr-targets bridge.

server_url: http://10.101.0.1:8080
listen_addr: 0.0.0.0:8080
metrics_listen_addr: 127.0.0.1:9090
grpc_listen_addr: 127.0.0.1:50443
grpc_allow_insecure: true

noise:
  private_key_path: /var/lib/headscale/noise_private.key

prefixes:
  v4: 100.64.0.0/10
  v6: fd7a:115c:a1e0::/48
  allocation: sequential

derp:
  server:
    enabled: false
  # No external DERP sources — only our local relay.
  urls: []
  paths:
    - /etc/headscale/derp-map.yaml
  auto_update_enabled: false
  update_frequency: 24h

ephemeral_node_inactivity_timeout: 30m

database:
  type: sqlite
  gorm:
    prepare_stmt: true
    parameterized_queries: true
    skip_err_record_not_found: true
    slow_threshold: 1000
  sqlite:
    path: /var/lib/headscale/db.sqlite
    write_ahead_log: true
    wal_autocheckpoint: 1000

tls_cert_path: ""
tls_key_path: ""

log:
  level: info
  format: text

policy:
  mode: file
  path: ""

dns:
  magic_dns: false
  override_local_dns: false
  base_domain: test.local
  nameservers:
    global:
      - 1.1.1.1
  extra_records: []
