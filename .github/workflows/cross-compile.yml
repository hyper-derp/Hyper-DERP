name: ARM64 Cross-Compile

on:
  push:
    branches: ["v0.1.x"]
  pull_request:
    branches: [master, "v0.1.x"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cross-compile-arm64:
    name: Build (aarch64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compile toolchain
        run: |
          sudo dpkg --add-architecture arm64
          # Pin existing sources to amd64 only.
          # DEB822 format: insert Architectures after Types line.
          sudo sed -i '/^Types:/a Architectures: amd64' /etc/apt/sources.list.d/ubuntu.sources 2>/dev/null || true
          # One-line format: add [arch=amd64] to bare deb lines.
          sudo sed -i '/^\s*deb \[/!s/^deb /deb [arch=amd64] /' /etc/apt/sources.list.d/*.list 2>/dev/null || true
          sudo sed -i '/^\s*deb \[/!s/^deb /deb [arch=amd64] /' /etc/apt/sources.list 2>/dev/null || true
          # Add arm64 from ports mirror.
          echo "deb [arch=arm64] http://ports.ubuntu.com/ noble main universe" | sudo tee /etc/apt/sources.list.d/arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ noble-updates main universe" | sudo tee -a /etc/apt/sources.list.d/arm64.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build \
            gcc-14-aarch64-linux-gnu \
            g++-14-aarch64-linux-gnu \
            liburing-dev:arm64 \
            libsodium-dev:arm64 \
            libspdlog-dev:arm64 \
            libssl-dev:arm64 \
            libcli11-dev \
            libasio-dev

      - name: Configure (arm64)
        run: |
          cmake \
            -DCMAKE_TOOLCHAIN_FILE=cmake/aarch64-toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -G Ninja \
            -B build-arm64

      - name: Build (arm64)
        run: cmake --build build-arm64 -j$(nproc)
