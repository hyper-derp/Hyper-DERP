name: Build, Test, and Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release:
    name: Release Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            ninja-build \
            liburing-dev \
            libsodium-dev \
            libspdlog-dev \
            libcli11-dev

      - name: Configure (release)
        run: cmake --preset default

      - name: Build (release)
        run: cmake --build build -j$(nproc)

  build-debug-and-test:
    name: Debug Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            ninja-build \
            liburing-dev \
            libsodium-dev \
            libspdlog-dev \
            libgtest-dev \
            libgmock-dev \
            libcli11-dev

      - name: Configure (debug)
        run: cmake --preset debug

      - name: Build (debug)
        run: cmake --build build-debug -j$(nproc)

      - name: Run tests
        run: ctest --test-dir build-debug --output-on-failure

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            ninja-build \
            liburing-dev \
            libsodium-dev \
            libspdlog-dev \
            libgtest-dev \
            libgmock-dev \
            libcli11-dev \
            clang-tidy
          pip install cpplint

      - name: Run cpplint
        run: cpplint --recursive src/ include/

      - name: Configure (debug, for compile_commands.json)
        run: cmake --preset debug

      - name: Build (debug)
        run: cmake --build build-debug -j$(nproc)

      - name: Run clang-tidy
        run: |
          clang-tidy \
            -p build-debug \
            src/*.cc \
            include/hyper_derp/*.h
