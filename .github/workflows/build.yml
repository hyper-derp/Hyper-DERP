name: CI

on:
  push:
    branches: [master, "v0.1.x"]
  pull_request:
    branches: [master, "v0.1.x"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cpplint
        run: pip install --break-system-packages cpplint

      - name: Run cpplint
        run: cpplint --recursive src/ include/ tools/ tests/

  test:
    name: Test
    if: >
      github.event_name == 'pull_request' ||
      startsWith(github.ref, 'refs/heads/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-14 g++-14 \
            cmake ninja-build \
            liburing-dev libsodium-dev \
            libgtest-dev libgmock-dev libcli11-dev \
            libssl-dev libasio-dev \
            libbpf-dev libmnl-dev libzmq3-dev cppzmq-dev
      - name: Set GCC 14
        run: |
          sudo update-alternatives \
            --install /usr/bin/gcc gcc /usr/bin/gcc-14 100 \
            --slave /usr/bin/g++ g++ /usr/bin/g++-14

      - name: Load kTLS module
        # HD mode requires TLS end-to-end, and the server
        # uses kTLS. Without the tls kernel module loaded
        # OpenSSL accepts the handshake but BIO_get_ktls_*
        # returns 0 and KtlsAccept fails.
        run: |
          sudo modprobe tls || echo "modprobe tls exited non-zero"
          uname -r
          lsmod | grep -i tls || echo "no tls module loaded"
          ls /sys/module/tls 2>&1 || true
          openssl version -a

      - name: Configure
        run: >
          cmake --preset debug
          -DCMAKE_C_COMPILER=gcc-14
          -DCMAKE_CXX_COMPILER=g++-14

      - name: Build
        run: cmake --build build-debug -j$(nproc)

      - name: Unit tests
        run: >
          ctest --test-dir build-debug
          --output-on-failure
          -E "E2E|Ktls"

  package:
    name: Package
    # Package only on pushes to release branches (v*).
    # Tag-driven releases go through release.yml; PRs
    # don't need a throwaway .deb.
    if: >
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/heads/v')
    needs: [test, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-14 g++-14 \
            cmake ninja-build \
            liburing-dev libsodium-dev \
            libgtest-dev libgmock-dev libcli11-dev \
            libssl-dev libasio-dev \
            libbpf-dev libmnl-dev libzmq3-dev cppzmq-dev
      - name: Set GCC 14
        run: |
          sudo update-alternatives \
            --install /usr/bin/gcc gcc /usr/bin/gcc-14 100 \
            --slave /usr/bin/g++ g++ /usr/bin/g++-14

      - name: Configure
        run: >
          cmake --preset default
          -DCMAKE_C_COMPILER=gcc-14
          -DCMAKE_CXX_COMPILER=g++-14

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Package
        run: cmake --build build --target package

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: hyper-derp-deb-amd64
          path: build/hyper-derp_*.deb
          retention-days: 30
