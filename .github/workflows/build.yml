name: CI

on:
  push:
    branches: [master, "v0.1.x"]
  pull_request:
    branches: [master, "v0.1.x"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-14 g++-14 \
            cmake ninja-build \
            liburing-dev libsodium-dev libspdlog-dev \
            libgtest-dev libgmock-dev libcli11-dev \
            libssl-dev libasio-dev
      - name: Set GCC 14
        run: |
          sudo update-alternatives \
            --install /usr/bin/gcc gcc /usr/bin/gcc-14 100 \
            --slave /usr/bin/g++ g++ /usr/bin/g++-14

      - name: Configure
        run: >
          cmake --preset debug
          -DCMAKE_C_COMPILER=gcc-14
          -DCMAKE_CXX_COMPILER=g++-14

      - name: Build
        run: cmake --build build-debug -j$(nproc)

      - name: Unit tests
        run: >
          ctest --test-dir build-debug
          --output-on-failure
          -E "E2E"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cpplint
        run: pip install --break-system-packages cpplint

      - name: Run cpplint
        run: cpplint --recursive src/ include/ tools/ tests/

  package:
    name: Package
    needs: [test, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-14 g++-14 \
            cmake ninja-build \
            liburing-dev libsodium-dev libspdlog-dev \
            libgtest-dev libgmock-dev libcli11-dev \
            libssl-dev libasio-dev
      - name: Set GCC 14
        run: |
          sudo update-alternatives \
            --install /usr/bin/gcc gcc /usr/bin/gcc-14 100 \
            --slave /usr/bin/g++ g++ /usr/bin/g++-14

      - name: Configure
        run: >
          cmake --preset default
          -DCMAKE_C_COMPILER=gcc-14
          -DCMAKE_CXX_COMPILER=g++-14

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Package
        run: cmake --build build --target package

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: hyper-derp-deb-amd64
          path: build/hyper-derp_*.deb
          retention-days: 30
