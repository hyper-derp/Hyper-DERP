name: CI

on:
  push:
    branches: [master, "v0.1.x"]
  pull_request:
    branches: [master, "v0.1.x"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cpplint
        run: pip install --break-system-packages cpplint

      - name: Run cpplint
        run: cpplint --recursive src/ include/ tools/ tests/

  test:
    name: Test
    if: >
      github.event_name == 'pull_request' ||
      startsWith(github.ref, 'refs/heads/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-14 g++-14 \
            cmake ninja-build \
            liburing-dev libsodium-dev \
            libgtest-dev libgmock-dev libcli11-dev \
            libssl-dev libasio-dev libboost-dev \
            libbpf-dev libmnl-dev libzmq3-dev cppzmq-dev
      - name: Set GCC 14
        run: |
          sudo update-alternatives \
            --install /usr/bin/gcc gcc /usr/bin/gcc-14 100 \
            --slave /usr/bin/g++ g++ /usr/bin/g++-14

      - name: Load kTLS module
        # HD mode requires TLS end-to-end, and the server
        # uses kTLS. The module is available on GitHub's
        # hosted runners (mlx5 holds it for offload) but
        # setsockopt(TCP_ULP, "tls") is blocked by the
        # runner sandbox, so BIO_get_ktls_* returns 0
        # even though the module is loaded. Tests that
        # start the HD server skip accordingly (see the
        # Unit tests step's -E filter).
        run: sudo modprobe tls || true

      - name: Configure
        run: >
          cmake --preset debug
          -DCMAKE_C_COMPILER=gcc-14
          -DCMAKE_CXX_COMPILER=g++-14

      - name: Build
        run: cmake --build build-debug -j$(nproc)

      - name: Unit tests
        # Excludes anything that forks an HD relay — the
        # GHA sandbox blocks setsockopt(TCP_ULP, "tls") so
        # KtlsAccept refuses the upgrade and the relay
        # never finishes coming up.
        run: >
          ctest --test-dir build-debug
          --output-on-failure
          -E "E2E|Ktls|ProductionTest|SdkTest|HdPeerInfoTest|HdReconnectTest|EinheitChannelTest|FleetTransitTest|OpenConnTest"

  package:
    name: Package
    # Package only on pushes to release branches (v*).
    # Tag-driven releases go through release.yml; PRs
    # don't need a throwaway .deb.
    if: >
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/heads/v')
    needs: [test, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-14 g++-14 \
            cmake ninja-build \
            liburing-dev libsodium-dev \
            libgtest-dev libgmock-dev libcli11-dev \
            libssl-dev libasio-dev libboost-dev \
            libbpf-dev libmnl-dev libzmq3-dev cppzmq-dev
      - name: Set GCC 14
        run: |
          sudo update-alternatives \
            --install /usr/bin/gcc gcc /usr/bin/gcc-14 100 \
            --slave /usr/bin/g++ g++ /usr/bin/g++-14

      - name: Configure
        run: >
          cmake --preset default
          -DCMAKE_C_COMPILER=gcc-14
          -DCMAKE_CXX_COMPILER=g++-14

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Package
        run: cmake --build build --target package

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: hyper-derp-deb-amd64
          path: build/hyper-derp_*.deb
          retention-days: 30
