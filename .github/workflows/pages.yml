name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "site/**"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install
        run: npm ci
        working-directory: site

      - name: Build site
        run: npm run build
        working-directory: site

      - name: Build APT repo
        env:
          APT_GPG_KEY: ${{ secrets.APT_GPG_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          REPO="site/build/repo"
          POOL="$REPO/pool/main"
          DIST="$REPO/dists/stable/main/binary-amd64"
          mkdir -p "$POOL" "$DIST"

          # Copy the public key into the build output.
          cp site/static/repo/key.gpg "$REPO/key.gpg"

          # Download all .deb assets from every GitHub release.
          gh release list --limit 100 --json tagName -q '.[].tagName' \
            | while read -r tag; do
                gh release download "$tag" \
                  --pattern '*.deb' \
                  --dir "$POOL" \
                  --skip-existing
              done

          if ! ls "$POOL"/*.deb >/dev/null 2>&1; then
            echo "::warning::No .deb packages found; skipping APT repo"
            exit 0
          fi

          # Generate Packages index.
          cd "$REPO"
          dpkg-scanpackages --multiversion pool/main > \
            dists/stable/main/binary-amd64/Packages
          gzip -k dists/stable/main/binary-amd64/Packages

          # Generate Release file.
          cd dists/stable
          apt-ftparchive \
            -o APT::FTPArchive::Release::Suite=stable \
            -o APT::FTPArchive::Release::Codename=stable \
            -o APT::FTPArchive::Release::Architectures=amd64 \
            -o APT::FTPArchive::Release::Components=main \
            -o APT::FTPArchive::Release::Origin=hyper-derp \
            -o APT::FTPArchive::Release::Label=Hyper-DERP \
            release . > Release

          # Sign Release with the CI key.
          echo "$APT_GPG_KEY" | gpg --batch --import
          gpg --batch --yes --armor \
            --local-user "ci@hyper-derp.dev" \
            --detach-sign -o Release.gpg Release
          gpg --batch --yes --armor \
            --local-user "ci@hyper-derp.dev" \
            --clearsign -o InRelease Release

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site/build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
