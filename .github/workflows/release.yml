name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  # Needed by `gh release create --discussion-category`.
  discussions: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  verify-branch:
    name: Verify release branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check tag is on a release branch
        run: |
          branches=$(git branch -r --contains "$GITHUB_SHA" \
            | grep -E 'origin/v[0-9]+\.[0-9]+\.x$' || true)
          if [ -z "$branches" ]; then
            echo "::error::Tag must be on a release branch (v*.x)"
            exit 1
          fi
          echo "Tag on: $branches"

  # Test job removed: build.yml runs the same suite on every PR
  # to master / v*.x, so by the time a tag points at v*.x the
  # tests already passed. verify-branch above ensures the tag
  # really is on a release branch. Re-running the full debug
  # build + ctest from a cold runner cache costs ~4 min for no
  # additional safety.

  build-amd64:
    name: Build (amd64)
    needs: [verify-branch]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-14 g++-14 \
            cmake ninja-build \
            liburing-dev libsodium-dev \
            libgtest-dev libgmock-dev libcli11-dev \
            libssl-dev libasio-dev libboost-dev \
            libbpf-dev libmnl-dev libzmq3-dev cppzmq-dev
      - name: Set GCC 14
        run: |
          sudo update-alternatives \
            --install /usr/bin/gcc gcc /usr/bin/gcc-14 100 \
            --slave /usr/bin/g++ g++ /usr/bin/g++-14

      - name: Configure
        run: >
          cmake --preset default
          -DCMAKE_C_COMPILER=gcc-14
          -DCMAKE_CXX_COMPILER=g++-14

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Package
        run: cmake --build build --target package

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: deb-amd64
          path: build/hyper-derp_*.deb

  build-arm64:
    name: Build (arm64)
    needs: [verify-branch]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compile toolchain
        run: |
          sudo dpkg --add-architecture arm64
          sudo sed -i '/^Types:/a Architectures: amd64' \
            /etc/apt/sources.list.d/ubuntu.sources 2>/dev/null || true
          sudo sed -i '/^\s*deb \[/!s/^deb /deb [arch=amd64] /' \
            /etc/apt/sources.list.d/*.list 2>/dev/null || true
          sudo sed -i '/^\s*deb \[/!s/^deb /deb [arch=amd64] /' \
            /etc/apt/sources.list 2>/dev/null || true
          echo "deb [arch=arm64] http://ports.ubuntu.com/ noble main universe" \
            | sudo tee /etc/apt/sources.list.d/arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ noble-updates main universe" \
            | sudo tee -a /etc/apt/sources.list.d/arm64.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build \
            gcc-14-aarch64-linux-gnu \
            g++-14-aarch64-linux-gnu \
            liburing-dev:arm64 \
            libsodium-dev:arm64 \
            libssl-dev:arm64 \
            libbpf-dev:arm64 libmnl-dev:arm64 \
            libzmq3-dev:arm64 cppzmq-dev \
            libcli11-dev \
            libasio-dev

      - name: Configure
        env:
          PKG_CONFIG_LIBDIR: /usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig
          PKG_CONFIG_PATH: ""
          PKG_CONFIG_SYSROOT_DIR: /
        run: >
          cmake
          -DCMAKE_TOOLCHAIN_FILE=cmake/aarch64-toolchain.cmake
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTING=OFF
          -G Ninja
          -B build-arm64

      - name: Build
        env:
          PKG_CONFIG_LIBDIR: /usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig
        run: cmake --build build-arm64 -j$(nproc)

      - name: Package
        env:
          PKG_CONFIG_LIBDIR: /usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig
        run: cmake --build build-arm64 --target package

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: deb-arm64
          path: build-arm64/hyper-derp_*.deb

  publish:
    name: Publish Release
    needs: [build-amd64, build-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need the working tree so we can read
          # dist/release-notes/<tag>.md.
          fetch-depth: 1

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: deb-*
          merge-multiple: true

      - name: Create GitHub release
        run: |
          notes_file="dist/release-notes/${GITHUB_REF_NAME}.md"
          # Release title becomes the discussion title; prefix
          # with the project name so the Discussions tab reads
          # "Hyper-DERP v0.2.0" instead of bare "v0.2.0".
          title="Hyper-DERP $GITHUB_REF_NAME"
          if [ -f "$notes_file" ]; then
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$title" \
              --notes-file "$notes_file" \
              --discussion-category Announcements \
              hyper-derp_*.deb
          else
            # Fallback: auto-generate from commit history when
            # we forgot to add a curated notes file.
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$title" \
              --generate-notes \
              --discussion-category Announcements \
              hyper-derp_*.deb
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
