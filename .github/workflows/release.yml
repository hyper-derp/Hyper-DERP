name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  verify-branch:
    name: Verify release branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check tag is on a release branch
        run: |
          branches=$(git branch -r --contains "$GITHUB_SHA" \
            | grep -E 'origin/v[0-9]+\.[0-9]+\.x$' || true)
          if [ -z "$branches" ]; then
            echo "::error::Tag must be on a release branch (v*.x)"
            exit 1
          fi
          echo "Tag on: $branches"

  test:
    name: Test
    needs: [verify-branch]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-14 g++-14 \
            cmake ninja-build \
            liburing-dev libsodium-dev \
            libgtest-dev libgmock-dev libcli11-dev \
            libssl-dev libasio-dev
      - name: Set GCC 14
        run: |
          sudo update-alternatives \
            --install /usr/bin/gcc gcc /usr/bin/gcc-14 100 \
            --slave /usr/bin/g++ g++ /usr/bin/g++-14

      - name: Configure
        run: >
          cmake --preset debug
          -DCMAKE_C_COMPILER=gcc-14
          -DCMAKE_CXX_COMPILER=g++-14

      - name: Build
        run: cmake --build build-debug -j$(nproc)

      - name: Unit tests
        run: >
          ctest --test-dir build-debug
          --output-on-failure
          -E "E2E|Ktls"

  release:
    name: Build and Publish
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-14 g++-14 \
            cmake ninja-build \
            liburing-dev libsodium-dev \
            libgtest-dev libgmock-dev libcli11-dev \
            libssl-dev libasio-dev
      - name: Set GCC 14
        run: |
          sudo update-alternatives \
            --install /usr/bin/gcc gcc /usr/bin/gcc-14 100 \
            --slave /usr/bin/g++ g++ /usr/bin/g++-14

      - name: Configure
        run: >
          cmake --preset default
          -DCMAKE_C_COMPILER=gcc-14
          -DCMAKE_CXX_COMPILER=g++-14

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Package
        run: cmake --build build --target package

      - name: Create GitHub release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --generate-notes \
            build/hyper-derp_*.deb
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
