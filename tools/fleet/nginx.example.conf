# Example nginx config for the fleet policy server.
#
# TLS termination + mTLS client-cert verification sit in
# front of serve.py via uwsgi. Relays authenticate with
# the mTLS client cert issued by the fleet operator's CA;
# serve.py does no auth of its own.

server {
  listen 443 ssl;
  server_name fleet.example.com;

  ssl_certificate     /etc/fleet/server.crt;
  ssl_certificate_key /etc/fleet/server.key;
  ssl_protocols       TLSv1.3;

  # Require a client cert signed by the fleet CA.
  ssl_client_certificate /etc/fleet/relay-ca.crt;
  ssl_verify_client      on;

  # Per-relay rate limit to mitigate poll-storm bugs.
  limit_req_zone $ssl_client_s_dn zone=fleet:10m rate=10r/s;

  location /api/v1/ {
    limit_req zone=fleet burst=20 nodelay;
    include uwsgi_params;
    uwsgi_param HD_FLEET_BUNDLE_PATH /var/fleet/bundle.json;
    uwsgi_pass unix:/run/fleet-serve.sock;
  }

  # Everything else 404s.
  location / {
    return 404;
  }

  access_log /var/log/nginx/fleet.access.log;
  error_log  /var/log/nginx/fleet.error.log warn;
}
